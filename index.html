  input[type=number]::-webkit-outer-spin-button,

  input[type=number] { -moz-appearance: textfield; }

  .step-btn { user-select: none; -webkit-user-select: none; }
  .chip-active { background-color: #0f172a; color: white; }
  .dark .chip-active { background-color: #f1f5f9; color: #0f172a; }
  /* Smooth scroll for chip nav */
  html { scroll-behavior: smooth; scroll-padding-top: 9.5rem; }

  .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 0) + 0.75rem); }

      </button>
    </div>
  </div>

  <!-- Category chip nav -->
  <nav id="chip-nav" class="max-w-5xl mx-auto px-3 pb-2 flex gap-1.5 overflow-x-auto whitespace-nowrap scrollbar-thin"></nav>
</header>

<!-- Mobile counters (visible below sm) -->
<div id="counters-mobile" class="sm:hidden max-w-5xl mx-auto px-3 pt-2 text-xs text-slate-500 dark:text-slate-400 tabular-nums"></div>

<!-- Streef-bewerk-banner -->
<div id="streef-banner" class="hidden sticky top-[8.5rem] z-20 bg-amber-100 dark:bg-amber-900/40 border-y border-amber-300 dark:border-amber-700 text-amber-900 dark:text-amber-100 text-sm">

  </div>
</div>

<!-- ============================ DELIVERY DAY PICKER (top of page) ============================ -->
<section id="delivery-picker" class="max-w-5xl mx-auto px-3 pt-3">

      <h3 class="text-xs uppercase tracking-wider text-emerald-900 dark:text-emerald-100 font-semibold">Leverdag</h3>
      <span id="sync-indicator" class="text-[11px] tabular-nums text-slate-500 dark:text-slate-400"></span>
    </div>
    <div id="quick-dates" class="grid grid-cols-3 gap-2 mb-2"></div>
    <div class="flex items-center gap-2">
      <label class="text-xs text-slate-600 dark:text-slate-400 shrink-0">Andere datum:</label>
      <input id="custom-date" type="date" class="flex-1 bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
    </div>
  </div>
</section>

<!-- ============================ MAIN ============================ -->
<main id="main" class="max-w-5xl mx-auto px-3 pt-3 pb-32"></main>

<!-- ============================ BOTTOM BAR ============================ -->
<div class="fixed bottom-0 inset-x-0 z-30 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur pb-safe">

  </div>
</div>


<!-- ============================ INGEDIEND-OVERLAY ============================ -->
<div id="submitted-screen" class="hidden fixed inset-0 z-50 bg-white dark:bg-slate-950 flex items-center justify-center px-6">

    </div>
    <h2 class="text-2xl font-semibold tracking-tight mb-1">De bestelling is ingediend.</h2>

    <button id="new-order-btn" class="mt-8 text-sm text-slate-500 dark:text-slate-400 underline">Nieuwe bestelling</button>
  </div>
</div>

<!-- ============================ MENU SHEET ============================ -->
<div id="menu-sheet" class="hidden fixed inset-0 z-40 bg-slate-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center" data-close-on-bg>

        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>

        <div class="font-medium label">Streef bewerken</div>
        <div class="text-xs text-slate-600 dark:text-slate-400">Per product de streefvoorraad (par level) instellen</div>
      </button>
      <div class="h-px bg-slate-200 dark:bg-slate-800 my-1"></div>
      <button id="reset-stock-btn" class="text-left px-3 py-2.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">

        <div class="text-xs text-slate-500 dark:text-slate-400">Maakt elk &ldquo;Voorraad nu&rdquo; veld leeg</div>

        <div class="text-xs text-slate-500 dark:text-slate-400">Zet alle par levels op 0</div>
      </button>
      <div class="h-px bg-slate-200 dark:bg-slate-800 my-1"></div>
      <button id="export-streef-btn" class="text-left px-3 py-2.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">

      </label>
    </div>
  </div>
</div>

/* ---------- LOCALSTORAGE ---------- */
const LS_KEYS = {
  voorraad: "vbl.voorraad",       // id -> raw string ("", "0,5", "3")
  streef:   "vbl.streef",         // id -> integer
  unavail:  "vbl.unavailable",    // id[] (unavailable on delivery day)
  theme:    "vbl.theme",
  selectedDate: "vbl.selectedDate", // gekozen leverdag (YYYY-MM-DD)
};

// Hardcoded Apps Script web-app endpoint. Eindigt op /exec.
const GS_URL = "https://script.google.com/macros/s/AKfycbySn0dBVBmVmxeB6FMTf8X19hEF0K6dheiTMJnLflKhEdCfIKhf8b8mPrZMweiOpSmP/exec";

function loadLS(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function saveLS(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

const state = {
  voorraad: loadLS(LS_KEYS.voorraad, {}),
  streef:   loadLS(LS_KEYS.streef, {}),
  unavail:  new Set(loadLS(LS_KEYS.unavail, [])),
  editStreef: false,
  selectedDate: localStorage.getItem(LS_KEYS.selectedDate) || null,
  pushing: false,
  syncStatus: "idle",   // idle | pending | saving | ok | error
  syncMsg: "",
  submitted: false,
};

function persist() {
  saveLS(LS_KEYS.voorraad, state.voorraad);
  saveLS(LS_KEYS.streef, state.streef);
  saveLS(LS_KEYS.unavail, [...state.unavail]);
}

/* ---------- HELPERS ---------- */
function parseDecimal(str) {
  if (str === "" || str == null) return null;
  const n = parseFloat(String(str).replace(",", "."));
  return Number.isFinite(n) ? n : null;
}
function teBestellen(id) {
  const streef = state.streef[id];
  if (!streef || streef <= 0) return null;
  const voorraad = parseDecimal(state.voorraad[id]) ?? 0;
  return Math.max(0, Math.ceil(streef - voorraad));
}
function categoryId(name) {
  return "cat-" + name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
}

        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="13" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- Voorraad-modus: groot voorraadveld + dikke +/- knoppen + grote 'te bestellen' badge -->
    <div class="voorraad-mode items-stretch gap-2" style="display:flex;">
      <div class="flex-1 flex items-stretch rounded-xl border-2 border-slate-300 dark:border-slate-700 focus-within:ring-2 focus-within:ring-emerald-500 focus-within:border-emerald-500 overflow-hidden bg-white dark:bg-slate-950 h-14">
        <button type="button" class="step-btn voorraad-step w-14 shrink-0 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 active:bg-slate-200 dark:active:bg-slate-700 text-3xl font-light leading-none flex items-center justify-center" data-step="-1" aria-label="Min 1">−</button>
        <input type="text" inputmode="decimal" enterkeyhint="done" autocomplete="off" class="voorraad-input flex-1 min-w-0 w-full bg-transparent text-center font-bold text-2xl focus:outline-none tabular-nums" value="${escapeAttr(String(voorraad))}" placeholder="0" />
        <button type="button" class="step-btn voorraad-step w-14 shrink-0 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 active:bg-slate-200 dark:active:bg-slate-700 text-3xl font-light leading-none flex items-center justify-center" data-step="1" aria-label="Plus 1">+</button>
      </div>
      <div class="te-bestellen min-w-[4.5rem] h-14 rounded-xl flex flex-col items-center justify-center font-bold text-xl px-3 tabular-nums bg-slate-100 dark:bg-slate-800 text-slate-400" aria-label="Te bestellen">
        <span class="te-bestellen-label text-[9px] font-semibold uppercase tracking-wider opacity-70">Bestel</span>
        <span class="te-bestellen-qty leading-none">—</span>
      </div>
    </div>

    <!-- Streef-bewerk-modus: alleen zichtbaar wanneer state.editStreef true -->

  // Wire inputs
  const vIn = card.querySelector(".voorraad-input");

  vIn.addEventListener("input", () => {
    const raw = vIn.value.trim();
    if (raw === "") delete state.voorraad[p.id];
    else state.voorraad[p.id] = raw;
    saveLS(LS_KEYS.voorraad, state.voorraad);
    updateCard(p.id);
    updateGlobal();
    scheduleSync();
  });
  vIn.addEventListener("blur", () => {
    // Normalize "0,5" -> keep raw input, but if invalid, clear
    if (vIn.value.trim() !== "" && parseDecimal(vIn.value) === null) {
      vIn.value = "";
      delete state.voorraad[p.id];
      saveLS(LS_KEYS.voorraad, state.voorraad);
      updateCard(p.id);
      updateGlobal();
      scheduleSync();
    }
  });

  sIn.addEventListener("input", () => {
    const n = parseInt(sIn.value, 10);
    if (!Number.isFinite(n) || n <= 0) delete state.streef[p.id];
    else state.streef[p.id] = n;
    saveLS(LS_KEYS.streef, state.streef);
    updateCard(p.id);
    updateGlobal();

      const next = Math.max(0, cur + step);
      vIn.value = String(next);
      state.voorraad[p.id] = String(next);
      saveLS(LS_KEYS.voorraad, state.voorraad);
      updateCard(p.id);
      updateGlobal();
      scheduleSync();
    });
  });

  card.querySelector(".unavail-toggle").addEventListener("click", () => {
    if (state.unavail.has(p.id)) state.unavail.delete(p.id);
    else state.unavail.add(p.id);
    saveLS(LS_KEYS.unavail, [...state.unavail]);
    renderCardClass(p.id);
  });

  return card;
}

function updateCard(id) {
  const card = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
  if (!card) return;
  const cell = card.querySelector(".te-bestellen");
  const qtySpan = cell.querySelector(".te-bestellen-qty");
  const qty = teBestellen(id);
  const isUnavail = state.unavail.has(id);

  cell.classList.remove(
    "bg-slate-100","dark:bg-slate-800","text-slate-400",
    "bg-emerald-100","dark:bg-emerald-900/40","text-emerald-700","dark:text-emerald-300",
    "bg-amber-100","dark:bg-amber-900/40","text-amber-800","dark:text-amber-200"
  );

  if (qty === null) {
    qtySpan.textContent = "—";
    cell.classList.add("bg-slate-100","dark:bg-slate-800","text-slate-400");
    cell.title = "Stel een streefvoorraad in via menu → Streef bewerken";
  } else if (qty === 0) {
    qtySpan.textContent = "0";
    cell.classList.add("bg-slate-100","dark:bg-slate-800","text-slate-400");
    cell.title = "";
  } else if (isUnavail) {
    qtySpan.textContent = "⚠" + qty;
    cell.classList.add("bg-amber-100","dark:bg-amber-900/40","text-amber-800","dark:text-amber-200");
    cell.title = "Niet beschikbaar op leverdag";
  } else {
    qtySpan.textContent = qty;
    cell.classList.add("bg-emerald-100","dark:bg-emerald-900/40","text-emerald-700","dark:text-emerald-300");
    cell.title = "";
  }
}

function updateAllCards() {
  DATA.categories.forEach(c => c.products.forEach(p => updateCard(p.id)));
}

function updateGlobal() {
  // Counters: filled (heeft voorraadNu) and to order (qty > 0)
  let total = 0, filled = 0, toOrderCount = 0, toOrderUnits = 0;
  const filledByCat = new Map();
  const totalByCat = new Map();

  DATA.categories.forEach(cat => {
    let f = 0;
    cat.products.forEach(p => {
      total++;
      const has = state.voorraad[p.id] !== undefined && state.voorraad[p.id] !== "";
      if (has) { filled++; f++; }
      const q = teBestellen(p.id);
      if (q && q > 0) { toOrderCount++; toOrderUnits += q; }
    });
    totalByCat.set(cat.name, cat.products.length);
    filledByCat.set(cat.name, f);
  });

  const cText = `ingevuld ${filled} / ${total} · te bestellen ${toOrderCount}`;
  document.getElementById("counters").textContent = cText;
  document.getElementById("counters-mobile").textContent = cText;

  document.getElementById("order-summary-line").textContent =
    `${filled} / ${total} ingevuld`;
  document.getElementById("order-summary-detail").textContent =
    `${toOrderCount} ${toOrderCount === 1 ? "product" : "producten"} te bestellen · ${toOrderUnits} ${toOrderUnits === 1 ? "verpakking" : "verpakkingen"}`;

  // chip counts
  document.querySelectorAll("#chip-nav .chip").forEach(chip => {
    const cat = chip.dataset.cat;
    chip.querySelector(".chip-count").textContent =
      `${filledByCat.get(cat) ?? 0}/${totalByCat.get(cat) ?? 0}`;
  });
}

function orderAsTSV() {
  return buildOrderRows().map(r => `${r.id}\t${r.title}\t${r.qty}`).join("\n");
}
function orderAsCSV() {
  const esc = s => /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  const head = "artikelnummer,naam,aantal";
  const body = buildOrderRows().map(r => `${esc(r.id)},${esc(r.title)},${r.qty}`).join("\n");
  return head + "\n" + body;
}

async function copyToClipboard(text, label) {
  try {
    await navigator.clipboard.writeText(text);
    showToast(`${label} gekopieerd (${text.split("\n").length} regels)`);
  } catch {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); showToast(`${label} gekopieerd`); }
    catch { showToast("Kopiëren mislukt — selecteer en kopieer handmatig", true); }
    document.body.removeChild(ta);
  }
}
function showToast(msg, isError) {
  // Vluchtige toast onderaan via dynamisch element (copy-toast bestaat niet meer)
  let el = document.getElementById("global-toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "global-toast";
    el.className = "fixed left-1/2 -translate-x-1/2 bottom-24 z-50 px-4 py-2 text-xs rounded-md shadow-lg hidden";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = `fixed left-1/2 -translate-x-1/2 bottom-24 z-50 px-4 py-2 text-xs rounded-md shadow-lg ${
    isError
      ? "bg-rose-600 text-white"
      : "bg-emerald-600 text-white"
  }`;
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.add("hidden"), 2400);
}

/* ---------- THEME ---------- */
function applyTheme(theme) {
  if (theme === "dark") document.documentElement.classList.add("dark");
  else document.documentElement.classList.remove("dark");
}
function initTheme() {
  const saved = localStorage.getItem(LS_KEYS.theme);
  if (saved) applyTheme(saved);
  else if (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) applyTheme("dark");
}
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle("dark");
  localStorage.setItem(LS_KEYS.theme, isDark ? "dark" : "light");
}

/* ---------- ESCAPING ---------- */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

/* ---------- IMPORT/EXPORT STREEFVOORRADEN ---------- */
function exportStreef() {
  const data = { exported: new Date().toISOString(), streefvoorraden: state.streef };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `streefvoorraden-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importStreef(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      const incoming = obj.streefvoorraden || obj;
      if (typeof incoming !== "object" || Array.isArray(incoming)) throw new Error("Ongeldig formaat");
      if (!confirm("Streefvoorraden vervangen door geïmporteerd bestand?")) return;
      state.streef = {};
      Object.entries(incoming).forEach(([id, v]) => {
        const n = parseInt(v, 10);
        if (Number.isFinite(n) && n > 0) state.streef[id] = n;
      });
      saveLS(LS_KEYS.streef, state.streef);
      // rerender values
      DATA.categories.forEach(c => c.products.forEach(p => {
        const card = document.querySelector(`.card[data-id="${CSS.escape(p.id)}"]`);
        if (card) {
          card.querySelector(".streef-input").value = state.streef[p.id] ?? "";
        }
      }));
      updateAllCards();
      updateGlobal();
      showToast(`Streefvoorraden geïmporteerd (${Object.keys(state.streef).length} producten)`);
      closeMenu();
    } catch (e) {
      alert("Importeren mislukt: " + e.message);
    }
  };
  reader.readAsText(file);
}

/* ---------- MENU / MODAL HELPERS ---------- */
function openModal(id) {
  document.getElementById(id).classList.remove("hidden");
  document.body.style.overflow = "hidden";
}
function closeModal(id) {
  document.getElementById(id).classList.add("hidden");
  document.body.style.overflow = "";
}
function closeMenu() { closeModal("menu-sheet"); }

/* ---------- INIT ---------- */
/* ---------- DATES ---------- */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function nextWeekday(targetDay) {
  const today = new Date(); today.setHours(0,0,0,0);
  let diff = (targetDay - today.getDay() + 7) % 7;
  if (diff === 0) diff = 7; // skip today, always next occurrence
  const d = new Date(today); d.setDate(today.getDate() + diff);
  return d;
}
function dateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function strToDate(str) {
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y, m-1, d);
}
function formatDateNL(d, includeYear) {
  const opts = { weekday: "short", day: "numeric", month: "short" };
  if (includeYear) opts.year = "numeric";
  return d.toLocaleDateString("nl-NL", opts);
}
function nextDeliveryDates() {
  // Mon=1, Thu=4, Sat=6 — leverdagen volgens Zusje-ritme
  return [nextWeekday(1), nextWeekday(4), nextWeekday(6)]
    .sort((a,b) => a - b)
    .map(d => ({ date: d, str: dateToStr(d), label: formatDateNL(d) }));
}
function countFilled(obj) {
  return Object.values(obj || {}).filter(v => v !== "" && v != null).length;
}

/* ---------- GOOGLE SHEETS PUSH ---------- */
function buildRows() {
  const rows = [];
  DATA.categories.forEach(cat => {
    cat.products.forEach(p => {
      const raw = state.voorraad[p.id];
      const num = (raw != null && raw !== "") ? parseDecimal(raw) : "";
      rows.push([p.title, num === null ? "" : num]);
    });
  });
  return rows;
}

async function pushToGoogleSheets(dateStr, { silent = false } = {}) {
  if (state.pushing) return false;
  state.pushing = true;
  setSyncStatus("saving");
  try {
    const payload = { date: dateStr, rows: buildRows() };
    const res = await fetch(GS_URL, {
      method: "POST",
      body: JSON.stringify(payload),
      redirect: "follow",
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error("Ongeldig antwoord van Apps Script"); }
    if (!data.ok) throw new Error(data.error || "Onbekende fout");
    setSyncStatus("ok");
    return true;
  } catch (err) {
    setSyncStatus("error", err.message);
    return false;
  } finally {
    state.pushing = false;
  }
}

function setSyncStatus(status, msg) {
  state.syncStatus = status;
  state.syncMsg = msg || "";
  const el = document.getElementById("sync-indicator");
  if (!el) return;
  if (status === "pending") {
    el.textContent = "wacht op synchronisatie…";
    el.className = "text-[11px] tabular-nums text-slate-500 dark:text-slate-400";
  } else if (status === "saving") {
    el.textContent = "bezig met opslaan…";
    el.className = "text-[11px] tabular-nums text-slate-600 dark:text-slate-300";
  } else if (status === "ok") {
    const t = new Date();
    el.textContent = `opgeslagen ${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`;
    el.className = "text-[11px] tabular-nums text-emerald-700 dark:text-emerald-400";
  } else if (status === "error") {
    el.textContent = "synchronisatie mislukt — probeer opnieuw";
    el.className = "text-[11px] tabular-nums text-rose-600 dark:text-rose-400";
    el.title = state.syncMsg;
  } else {
    el.textContent = "";
    el.className = "text-[11px] tabular-nums text-slate-500 dark:text-slate-400";
  }
}

/* ---------- LIVE SYNC (debounced) ---------- */
let _syncTimer = null;
function scheduleSync() {
  if (!state.selectedDate) return;
  if (state.submitted) return;
  setSyncStatus("pending");
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => {
    pushToGoogleSheets(state.selectedDate, { silent: true });
  }, 1500);
}

/* ---------- SUBMIT ---------- */
async function submitOrder() {
  if (!state.selectedDate) {
    alert("Kies eerst een leverdag bovenaan.");
    return;
  }
  if (countFilled(state.voorraad) === 0) {
    alert("Vul eerst minstens één voorraad in.");
    return;
  }
  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  document.getElementById("submit-label").textContent = "Bezig met indienen…";
  // Cancel pending debounced sync (we doen nu een synchrone push)
  clearTimeout(_syncTimer);
  const ok = await pushToGoogleSheets(state.selectedDate, { silent: true });
  btn.disabled = false;
  document.getElementById("submit-label").textContent = "Indienen";
  if (!ok) {
    alert("Indienen mislukt: " + (state.syncMsg || "onbekende fout") + ".\nProbeer opnieuw of controleer je internetverbinding.");
    return;
  }
  // Toon ingediend-scherm
  state.submitted = true;
  document.getElementById("submitted-detail").textContent =
    `Leverdag: ${formatDateNL(strToDate(state.selectedDate), true)}`;
  document.getElementById("submitted-screen").classList.remove("hidden");
}

/* ---------- RENDER DATE PICKER ---------- */
function renderDatePicker() {
  const upcoming = nextDeliveryDates();
  const todayKey = todayStr();
  // Geldigheid van opgeslagen datum: niet in het verleden
  if (state.selectedDate && state.selectedDate < todayKey) state.selectedDate = null;
  if (!state.selectedDate) state.selectedDate = upcoming[0].str;

  const chips = document.getElementById("quick-dates");
  chips.innerHTML = "";
  upcoming.forEach(d => {
    const btn = document.createElement("button");
    const isActive = d.str === state.selectedDate;
    btn.type = "button";
    btn.dataset.date = d.str;
    btn.className = "px-2 py-2.5 rounded-lg text-xs font-medium border-2 transition-colors " +
      (isActive
        ? "bg-emerald-600 border-emerald-600 text-white shadow-sm"
        : "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200");
    btn.innerHTML = `<div class="text-[10px] opacity-70 capitalize">${d.label.split(" ")[0]}</div><div class="text-sm font-semibold">${d.label.split(" ").slice(1).join(" ")}</div>`;
    btn.addEventListener("click", () => selectDate(d.str));
    chips.appendChild(btn);
  });

  const dateInput = document.getElementById("custom-date");
  dateInput.value = state.selectedDate;
  dateInput.min = todayKey;
}

function selectDate(dateStr) {
  state.selectedDate = dateStr;
  localStorage.setItem(LS_KEYS.selectedDate, dateStr);
  renderDatePicker();
  updateGlobal();
  // Bij datum-wissel: re-sync naar (nieuwe) sheet-blad
  scheduleSync();
}


/* ---------- ZOOM PREVENTION (mobile) ---------- */
function preventZoomGestures() {
  // Block iOS pinch-zoom (Safari ignores user-scalable=no for accessibility but listens to gesturestart)
  ["gesturestart", "gesturechange", "gestureend"].forEach(ev =>
    document.addEventListener(ev, e => e.preventDefault(), { passive: false })
  );
  // Block iOS double-tap-to-zoom on non-interactive areas. We do NOT block
  // on buttons/inputs because rapid +/- tapping must still fire its click events;
  // touch-action: manipulation handles those elements directly.
  let lastTouchEnd = 0;
  document.addEventListener("touchend", e => {
    const now = Date.now();
    const interactive = e.target.closest("button, input, a, label, select, textarea, [role=button]");
    if (!interactive && now - lastTouchEnd <= 350) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });
  // Block ctrl/cmd + wheel zoom on desktop
  document.addEventListener("wheel", e => {
    if (e.ctrlKey) e.preventDefault();
  }, { passive: false });
}

function init() {
  preventZoomGestures();
  initTheme();
  renderChips();
  renderMain();
  updateAllCards();
  updateGlobal();
  applyEditStreefMode();

  // Search
  const search = document.getElementById("search");
  search.addEventListener("input", e => applySearch(e.target.value));
  document.getElementById("search-clear").addEventListener("click", () => {
    search.value = ""; applySearch(""); search.focus();
  });

  // Theme toggle
  document.getElementById("dark-toggle").addEventListener("click", toggleTheme);

  // Submit-knop
  document.getElementById("submit-btn").addEventListener("click", submitOrder);
  document.getElementById("new-order-btn").addEventListener("click", () => {
    state.submitted = false;
    document.getElementById("submitted-screen").classList.add("hidden");
  });

  // Leverdag picker
  renderDatePicker();
  document.getElementById("custom-date").addEventListener("change", e => {
    if (e.target.value) selectDate(e.target.value);
  });

  // Menu
  document.getElementById("menu-btn").addEventListener("click", () => openModal("menu-sheet"));
  document.querySelectorAll("[data-close-menu]").forEach(el => el.addEventListener("click", closeMenu));
  document.getElementById("menu-sheet").addEventListener("click", e => {
    if (e.target.id === "menu-sheet") closeMenu();
  });

  document.getElementById("reset-stock-btn").addEventListener("click", () => {
    if (!confirm("Alle ingevulde voorraden wissen?")) return;
    state.voorraad = {};
    saveLS(LS_KEYS.voorraad, state.voorraad);
    DATA.categories.forEach(c => c.products.forEach(p => {
      const card = document.querySelector(`.card[data-id="${CSS.escape(p.id)}"]`);
      if (card) card.querySelector(".voorraad-input").value = "";
    }));
    updateAllCards();
    updateGlobal();
    closeMenu();
    showToast("Voorraden gewist");
  });

  document.getElementById("reset-streef-btn").addEventListener("click", () => {
    if (!confirm("Alle streefvoorraden op 0 zetten?")) return;
    state.streef = {};
    saveLS(LS_KEYS.streef, state.streef);
    DATA.categories.forEach(c => c.products.forEach(p => {
      const card = document.querySelector(`.card[data-id="${CSS.escape(p.id)}"]`);
      if (card) card.querySelector(".streef-input").value = "";
    }));
    updateAllCards();
    updateGlobal();
    closeMenu();
    showToast("Streefvoorraden gereset");
  });

  document.getElementById("toggle-streef-btn").addEventListener("click", () => {
    state.editStreef = !state.editStreef;
    applyEditStreefMode();
    closeMenu();
  });
  document.getElementById("streef-banner-done").addEventListener("click", () => {
    state.editStreef = false;
    applyEditStreefMode();
  });

  document.getElementById("export-streef-btn").addEventListener("click", () => { exportStreef(); closeMenu(); });
  document.getElementById("import-streef-input").addEventListener("change", e => {
    const f = e.target.files?.[0];
    if (f) importStreef(f);
    e.target.value = "";
  });

  // Esc sluit menu
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeMenu();
  });
}

document.addEventListener("DOMContentLoaded", init);
</script>
